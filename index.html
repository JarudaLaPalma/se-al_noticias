<style>
  :root{
    color-scheme: light;
    --paper:#EDEEE7;
    --paper-raised:#F7F7F2;
    --ink:#1B1D1B;
    --ink-soft:#5B5F58;
    --line:#D3D4CA;
    --ok:#2C5B4B;
    --err:#A8351F;
    --shadow-soft: rgba(27,29,27,0.08);
  }
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]){
      color-scheme: dark;
      --paper:#171813;
      --paper-raised:#212219;
      --ink:#EDEEE7;
      --ink-soft:#9C9E92;
      --line:#3A3B32;
      --ok:#63AC90;
      --err:#E37A62;
      --shadow-soft: rgba(0,0,0,0.35);
    }
  }
  :root[data-theme="dark"]{
    color-scheme: dark;
    --paper:#171813;
    --paper-raised:#212219;
    --ink:#EDEEE7;
    --ink-soft:#9C9E92;
    --line:#3A3B32;
    --ok:#63AC90;
    --err:#E37A62;
    --shadow-soft: rgba(0,0,0,0.35);
  }
  :root[data-theme="light"]{
    color-scheme: light;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:Georgia, 'Times New Roman', serif;
    min-height:100vh;
    padding-bottom:48px;
  }
  a{color:inherit;}

  /* ---------- HEADER ---------- */
  header{
    position:sticky; top:0; z-index:20;
    background:var(--paper);
    border-bottom:1px solid var(--ink);
    padding:calc(env(safe-area-inset-top, 0px) + 14px) 16px 10px;
  }
  .brand-row{
    display:flex; align-items:baseline; justify-content:space-between;
    font-family:'Arial Narrow', Arial, sans-serif;
  }
  .brand{
    font-size:30px; font-weight:800; letter-spacing:0.5px;
    text-transform:uppercase; line-height:0.9;
  }
  .brand small{
    display:block; font-family:ui-monospace, 'SF Mono', 'Cascadia Code', 'Roboto Mono', monospace;
    font-size:9.5px; font-weight:500; letter-spacing:1.5px;
    color:var(--ink-soft); text-transform:uppercase; margin-top:3px;
  }
  .clock{
    font-family:ui-monospace, 'SF Mono', 'Cascadia Code', 'Roboto Mono', monospace;
    font-size:11px; color:var(--ink-soft); text-align:right;
    line-height:1.5;
  }
  .clock b{color:var(--ink); font-weight:600;}

  /* signal status strip — signature element */
  .signal-strip{
    margin-top:12px; display:flex; gap:0; border:1px solid var(--ink);
    background:var(--paper-raised); overflow:hidden;
  }
  .signal-item{
    flex:1; padding:6px 8px; font-family:ui-monospace, 'SF Mono', 'Cascadia Code', 'Roboto Mono', monospace;
    font-size:9.5px; border-right:1px solid var(--line);
    display:flex; align-items:center; gap:5px; white-space:nowrap; overflow:hidden;
  }
  .signal-item:last-child{border-right:none;}
  .dot{width:6px; height:6px; border-radius:50%; flex-shrink:0; background:var(--line);}
  .dot.ok{background:var(--ok);}
  .dot.err{background:var(--err);}
  .dot.pending{background:#C9A227; animation:pulse 1s infinite;}
  @keyframes pulse{50%{opacity:0.3;}}
  .signal-item span{overflow:hidden; text-overflow:ellipsis;}

  /* ---------- FILTERS ---------- */
  .filters{
    display:flex; gap:8px; padding:12px 16px; overflow-x:auto;
    scrollbar-width:none; background:var(--paper);
    position:sticky; top:0; z-index:19;
  }
  .filters::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0; font-family:ui-monospace, 'SF Mono', 'Cascadia Code', 'Roboto Mono', monospace; font-size:11px;
    font-weight:600; letter-spacing:0.3px; text-transform:uppercase;
    padding:7px 12px; border:1px solid var(--ink); background:var(--paper-raised);
    cursor:pointer; user-select:none; transition:all .15s ease;
  }
  .chip.active{background:var(--ink); color:var(--paper);}
  .chip.chip-saved{display:flex; align-items:center; gap:4px;}

  /* ---------- REFRESH BAR ---------- */
  .toolbar{
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;
    padding:0 16px 10px; font-family:ui-monospace, 'SF Mono', 'Cascadia Code', 'Roboto Mono', monospace; font-size:10.5px; color:var(--ink-soft);

  .refresh-btn{padding:5px 8px;}
  .refresh-btn{
    font-family:ui-monospace, 'SF Mono', 'Cascadia Code', 'Roboto Mono', monospace; font-size:11px; font-weight:600;
    background:none; border:1px solid var(--ink); padding:5px 10px; cursor:pointer;
    text-transform:uppercase; letter-spacing:0.3px; display:flex; align-items:center; gap:6px;

  .refresh-btn:active{background:var(--ink); color:var(--paper);}
  .refresh-btn.spinning svg{animation:spin 0.8s linear infinite;}

  /* Interruptor de tema (claro/oscuro/automático) */
  .theme-switch{
    position:relative; width:50px; height:26px; padding:0; flex-shrink:0;
    border:1px solid var(--line); border-radius:13px; background:var(--paper);
    cursor:pointer; box-shadow:inset 0 1px 2px var(--shadow-soft);
  }
  .theme-switch-thumb{
    position:absolute; top:1px; left:1px; width:22px; height:22px; border-radius:50%;
    background:var(--paper-raised); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; color:var(--ink-soft);
    transition:left .18s ease, background .18s ease, color .18s ease, border-color .18s ease;
  }
  .theme-switch[data-dark="true"]{background:var(--ink);}
  .theme-switch[data-dark="true"] .theme-switch-thumb{
    left:calc(100% - 24px); background:var(--paper); color:var(--ink); border-color:var(--paper);
  }
  .theme-switch-thumb svg{overflow:visible;}

  /* ---------- FEED ---------- */
  main{padding:4px 16px 24px;}
  .card{
    display:block; background:var(--paper-raised); border:1px solid var(--line);
    border-left:4px solid var(--ink); margin-bottom:12px; padding:12px 14px;
    text-decoration:none; color:var(--ink); position:relative;
  }
  .card-wrap{position:relative; margin-bottom:12px; overflow:hidden; border-radius:1px;}
  .card-wrap .card{
    margin-bottom:0; position:relative; z-index:2; background:var(--paper-raised);
    touch-action:pan-y; -webkit-user-select:none; user-select:none;
  }

  .card-wrap .card img{-webkit-user-drag:none; user-drag:none; pointer-events:none;}
  /* Capa única de swipe: un solo color a la vez, sin "costura" entre dos mitades */
  .swipe-layer{
    position:absolute; inset:0; z-index:1; display:flex; align-items:center;
    font-family:ui-monospace, monospace; font-size:11px; font-weight:700;
    text-transform:uppercase; letter-spacing:.4px; color:#fff; opacity:0;

  .card-title{

  }
  .card-thumb{
    width:74px; height:74px; object-fit:cover; flex-shrink:0;
    background:var(--line); filter:grayscale(15%);
  }

  .source-link{
    display:inline-block; margin-top:2px; font-family:ui-monospace, 'SF Mono', 'Cascadia Code', 'Roboto Mono', monospace;
    font-size:11px; font-weight:600; text-decoration:underline;
    color:var(--ink) !important;

  .empty, .loading{

    color:var(--ink-soft); font-size:12.5px; line-height:1.7;
  }
  .loading .dot{display:inline-block; animation:pulse 1s infinite; margin:0 1px;}

    margin:0 16px 14px; border:1px solid var(--ink); background:var(--paper-raised);
    padding:14px;

  .sources-panel h3{
    margin:0 0 10px; font-family:ui-monospace, 'SF Mono', 'Cascadia Code', 'Roboto Mono', monospace; font-size:11px;
    font-weight:600; text-transform:uppercase; letter-spacing:0.4px;
  }
  .sources-group{margin-bottom:12px;}
  .sources-group-label{
    font-family:ui-monospace, 'SF Mono', 'Cascadia Code', 'Roboto Mono', monospace; font-size:9.5px; color:var(--ink-soft);
    text-transform:uppercase; letter-spacing:0.4px; margin-bottom:5px;
  }
  .sources-row{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    padding:6px 8px; background:var(--paper); border:1px solid var(--line); margin-bottom:5px;
    font-size:12.5px;
  }
  .sources-row-name{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .sources-row-url{
    display:block; font-family:ui-monospace, 'SF Mono', 'Cascadia Code', 'Roboto Mono', monospace; font-size:9.5px;

  }
  .remove-btn{
    flex-shrink:0; background:none; border:1px solid var(--err); color:var(--err);
    font-family:ui-monospace, 'SF Mono', 'Cascadia Code', 'Roboto Mono', monospace; font-size:11px; font-weight:700;

  }
  .sources-empty{font-size:12px; color:var(--ink-soft); font-style:italic; margin-bottom:8px;}

    padding-top:12px; border-top:1px dashed var(--line);

  .sources-form input, .sources-form select{
    font-family:ui-monospace, 'SF Mono', 'Cascadia Code', 'Roboto Mono', monospace; font-size:12.5px; padding:7px 8px;

    text-transform:uppercase; letter-spacing:0.3px; padding:8px; cursor:pointer;
    background:var(--ink); color:var(--paper); border:none;
  }
  .sources-error{font-size:11.5px; color:var(--err); font-family:ui-monospace, 'SF Mono', 'Cascadia Code', 'Roboto Mono', monospace;}
  .swatches{display:flex; flex-wrap:wrap; gap:6px; margin:2px 0 4px;}
  .swatch{
    width:24px; height:24px; border:2px solid transparent; cursor:pointer; padding:0;
  }
  .swatch.selected{border-color:var(--ink);}
  .cat-row{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    padding:6px 8px; background:var(--paper); border:1px solid var(--line); margin-bottom:5px;
    font-size:12.5px;
  }
  .cat-row-swatch{width:12px; height:12px; flex-shrink:0;}
  .cat-row-name{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:flex; align-items:center; gap:8px;}

  /* ---------- LEGAL MODAL ---------- */
  .legal-overlay{
    position:fixed; inset:0; background:rgba(27,29,27,0.55); z-index:60;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .legal-panel{
    background:var(--paper); width:100%; max-width:640px; max-height:88vh;
    overflow-y:auto; border-top:1px solid var(--ink); padding-bottom:24px;
  }
  .legal-top{
    position:sticky; top:0; background:var(--paper); border-bottom:1px solid var(--line);
    padding:12px 16px; display:flex; align-items:center; justify-content:space-between; z-index:2;
  }
  .legal-top h2{margin:0; font-size:15px;}
  .legal-close{
    font-family:ui-monospace, monospace; font-size:11px; font-weight:600;
    background:none; border:1px solid var(--ink); padding:5px 10px; cursor:pointer;
  }
  .legal-body{padding:6px 18px 4px; font-size:13.5px; line-height:1.6;}
  .legal-body h3{font-size:14px; margin:20px 0 4px; border-bottom:1px solid var(--line); padding-bottom:4px;}
  .legal-body h4{font-size:12.5px; margin:14px 0 3px;}
  .legal-body p, .legal-body li{margin:0 0 8px;}
  .legal-body ul{padding-left:18px;}
  .legal-note{
    background:var(--paper-raised); border:1px solid var(--line); padding:8px 10px;
    font-family:ui-monospace, monospace; font-size:11px; color:var(--ink-soft); margin:6px 0 16px;
  }

  footer{
    padding:18px 16px 30px; font-family:ui-monospace, 'SF Mono', 'Cascadia Code', 'Roboto Mono', monospace; font-size:9.5px;
    color:var(--ink-soft); border-top:1px solid var(--line); margin-top:10px; line-height:1.7;
  }
</style>
</head>

function timeAgo(dateStr){
  const diff = (Date.now() - new Date(dateStr).getTime())/1000;
  if(diff < 60) return 'ahora';
  if(diff < 3600) return `hace ${Math.floor(diff/60)} min`;
  if(diff < 86400) return `hace ${Math.floor(diff/3600)} h`;
  return `hace ${Math.floor(diff/86400)} d`;
}

function stripHtml(html){
  const tmp = document.createElement('div');
  tmp.innerHTML = html || '';
  return (tmp.textContent || tmp.innerText || '').trim();
}

function extractImageFromHtml(html){
  const m = (html||'').match(/<img[^>]+src="([^">]+)"/);
  return m ? m[1] : null;
}

function text(node, selector){
  const el = node.querySelector(selector);
  return el ? el.textContent.trim() : '';
}

function parseFeedXml(xmlText, catId, feedName){
  const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
  if(doc.querySelector('parsererror')) throw new Error('parse error');

  const isAtom = doc.querySelector('feed') !== null;
  const nodes = isAtom ? [...doc.querySelectorAll('entry')] : [...doc.querySelectorAll('item')];
  if(!nodes.length) throw new Error('empty feed');

  return nodes.slice(0,12).map(node=>{
    let link = '';
    if(isAtom){
      const linkEl = node.querySelector('link[href]');
      link = linkEl ? linkEl.getAttribute('href') : '';
    } else {
      link = text(node,'link');
    }
    const title = text(node,'title') || '(sin título)';
    const dateStr = text(node,'pubDate') || text(node,'published') || text(node,'updated') || text(node,'date') || new Date().toISOString();
    const rawDesc = text(node,'description') || text(node,'summary') || text(node,'content') || '';

    let image = null;
    const media = node.querySelector('thumbnail, [url]');
    if(media && media.getAttribute('url')) image = media.getAttribute('url');
    const enclosure = node.querySelector('enclosure[url]');
    if(!image && enclosure && (enclosure.getAttribute('type')||'').startsWith('image')) image = enclosure.getAttribute('url');
    if(!image) image = extractImageFromHtml(rawDesc);

    return {
      cat: catId,
      source: feedName,
      title: stripHtml(title),
      link,
      date: dateStr,
      excerptShort: stripHtml(rawDesc).slice(0,160),
      image
    };
  });
}

function fetchProxy(targetUrl){
  return fetch(PROXY_BASE + encodeURIComponent(targetUrl), {
    cache:'no-store',
    headers: { 'X-Senal-Key': PROXY_KEY }
  });
}

async function fetchFeed(feed){
  const res = await fetchProxy(feed.url);
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const xmlText = await res.text();
  return parseFeedXml(xmlText, feed.cat, feed.name);
}

let LOAD_GENERATION = 0;

// ---------- Caché local de noticias (para mostrar algo al abrir la app sin pedir red) ----------
// Por ahora la app NUNCA pide red por su cuenta: al abrir, si hay algo en esta caché se
// muestra tal cual (aunque tenga horas), y solo se refresca de verdad cuando pulsas
// "Actualizar" (o al añadir/quitar una fuente).
const ITEMS_CACHE_KEY = 'senal_items_cache_v1';

function feedsSignature(){ return FEEDS.map(f=>f.id+':'+f.url).sort().join('|'); }

function readItemsCache(){
  try{
    const raw = localStorage.getItem(ITEMS_CACHE_KEY);
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    if(!parsed || !Array.isArray(parsed.items)) return null;
    return parsed;
  }catch(e){ return null; }
}
function writeItemsCache(){
  try{
    localStorage.setItem(ITEMS_CACHE_KEY, JSON.stringify({
      ts: Date.now(),
      signature: feedsSignature(),
      items: ALL_ITEMS,
    }));
  }catch(e){}
}

async function loadAll(){
  if(!PROXY_READY){ renderSetupScreen(); return; }

  if(!FEEDS.length){
    document.getElementById('signalStrip').innerHTML = '';
    document.getElementById('main').innerHTML = `<div class="empty">NO TIENES NINGUNA FUENTE AÑADIDA<br>Pulsa "Fuentes" para añadir tu primer RSS.</div>`;
    document.getElementById('countLabel').textContent = 'Sin fuentes';
    return;
  }

  const myGen = ++LOAD_GENERATION;
  document.getElementById('refreshBtn').classList.add('spinning');
  document.getElementById('countLabel').textContent = 'Cargando fuentes…';
  renderSignalStrip();

  const jobs = FEEDS.map(f =>
    fetchFeed(f)
      .then(items=>{ if(myGen===LOAD_GENERATION) setSignal(f.id,'ok'); return items; })
      .catch(()=>{ if(myGen===LOAD_GENERATION) setSignal(f.id,'err'); return []; })
  );

  const results = await Promise.all(jobs);
  if(myGen !== LOAD_GENERATION) return; // una carga más reciente ya está en curso: descartamos esta

  ALL_ITEMS = results.flat().sort((a,b)=> new Date(b.date) - new Date(a.date));
  writeItemsCache();
  document.getElementById('refreshBtn').classList.remove('spinning');
  renderFeed();
}

// ---------- Carga inicial: por ahora NUNCA pide red sola. Solo pinta lo que ya
// hubiera en caché local (si lo hay) y espera a que el usuario pulse "Actualizar".
// Esto es temporal, para poder probar el botón de refrescar de forma aislada
// mientras se ajusta el Worker.
function initFeed(){
  if(!PROXY_READY){ renderSetupScreen(); return; }

  if(!FEEDS.length){
    document.getElementById('signalStrip').innerHTML = '';
    document.getElementById('main').innerHTML = `<div class="empty">NO TIENES NINGUNA FUENTE AÑADIDA<br>Pulsa "Fuentes" para añadir tu primer RSS.</div>`;
    document.getElementById('countLabel').textContent = 'Sin fuentes';
    return;
  }

  const cached = readItemsCache();
  renderSignalStrip();

  if(cached && cached.signature === feedsSignature() && cached.items.length){
    ALL_ITEMS = cached.items;
    FEEDS.forEach(f => setSignal(f.id, 'ok'));
    renderFeed();
    const mins = Math.max(0, Math.round((Date.now() - cached.ts)/60000));
    const when = mins < 1 ? 'hace un momento' : `hace ${mins} min`;
    document.getElementById('countLabel').textContent =
      `${ALL_ITEMS.filter(i=>!DISMISSED.has(i.link)).length} noticias · última carga ${when} · pulsa Actualizar para refrescar`;
  } else {
    FEEDS.forEach(f => setSignal(f.id, 'pending'));
    document.getElementById('main').innerHTML = `<div class="empty">TODAVÍA NO HAS CARGADO NOTICIAS<br>Pulsa "Actualizar" arriba para traerlas.</div>`;
    document.getElementById('countLabel').textContent = 'Pulsa "Actualizar" para cargar noticias';
  }
}

// ---------- Gestos táctiles: deslizar para guardar / descartar ----------
function attachSwipe(wrap, card, item){
  if(ACTIVE_FILTER === 'guardados') return; // en Guardados no hace falta gesto de descarte
  const swipeLayer = wrap.querySelector('.swipe-layer');
  const threshold = 64; // umbral más cercano, como se pidió
  const AXIS_LOCK_PX = 8; // píxeles de margen antes de decidir si es swipe horizontal o scroll vertical
  let startX = 0, startY = 0, dx = 0, axis = null, active = false;

  function paint(){
    const intensity = Math.min(Math.abs(dx) / threshold, 1);
    if(dx > 2){
      swipeLayer.className = 'swipe-layer save';
      swipeLayer.innerHTML = `<div class="swipe-action">${bookmarkIcon(14)} Guardar</div>`;
    } else if(dx < -2){
      swipeLayer.className = 'swipe-layer discard';
      swipeLayer.innerHTML = `<div class="swipe-action">✕ Descartar</div>`;
    } else {
      swipeLayer.className = 'swipe-layer';
    }
    swipeLayer.style.opacity = intensity.toFixed(2);
  }

  function resetVisual(){
    card.style.transition = '';
    card.style.transform = 'translateX(0)';
    swipeLayer.style.opacity = '0';
    swipeLayer.className = 'swipe-layer';
  }

  function onStart(x, y){
    active = true; axis = null; startX = x; startY = y; dx = 0;
    card.style.transition = 'none';
  }

  // Devuelve true si el gesto se ha "bloqueado" como horizontal (para poder frenar el scroll)
  function onMove(x, y){
    if(!active) return false;
    const rawDx = x - startX, rawDy = y - startY;
    if(axis === null){
      if(Math.abs(rawDx) < AXIS_LOCK_PX && Math.abs(rawDy) < AXIS_LOCK_PX) return false;
      axis = Math.abs(rawDx) > Math.abs(rawDy) ? 'x' : 'y';
      if(axis !== 'x'){ active = false; return false; } // es scroll vertical: lo soltamos
    }
    if(axis !== 'x') return false;
    dx = rawDx;
    card.style.transform = `translateX(${dx}px)`;
    paint();
    return true;
  }

  function onEnd(){
    if(!active){ return; }
    active = false;
    card.style.transition = '';
    if(axis === 'x'){
      if(dx <= -threshold){
        runDiscardAnimation(wrap, item);
        return;
      } else if(dx >= threshold){
        toggleSaved(item);
        resetVisual();
        renderFeed();
        return;
      }
    }
    resetVisual();
  }

  // --- Táctil (móvil) ---
  card.addEventListener('touchstart', e=>{
    const t = e.touches[0];
    onStart(t.clientX, t.clientY);
  }, { passive:true });
  card.addEventListener('touchmove', e=>{
    const t = e.touches[0];
    const locked = onMove(t.clientX, t.clientY);
    if(locked) e.preventDefault(); // solo frenamos el scroll cuando SÍ es un swipe horizontal
  }, { passive:false });
  card.addEventListener('touchend', onEnd);
  card.addEventListener('touchcancel', onEnd);

  // --- Ratón (escritorio) ---
  card.addEventListener('mousedown', e=>{
    if(e.button !== 0) return;
    onStart(e.clientX, e.clientY);
    const onMouseMove = ev => onMove(ev.clientX, ev.clientY);
    const onMouseUp = ()=>{
      onEnd();
      window.removeEventListener('mousemove', onMouseMove);
      window.removeEventListener('mouseup', onMouseUp);
    };
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
  });
}

function runDiscardAnimation(wrap, item){
  const card = wrap.querySelector('.card');
  card.style.transition = 'transform .2s ease, opacity .2s ease';
  card.style.transform = 'translateX(-110%)';
  card.style.opacity = '0';
  setTimeout(()=>{
    dismissItem(item.link);
    renderFeed();
  }, 200);
}

function renderSourcesPanel(){

  root.innerHTML = `

          ${getAllCategories().map(c=>`<option value="${c.id}">${c.label}</option>`).join('')}
        </select>
        <button id="addFeedBtn">Añadir fuente</button>
        ${SOURCES_ERROR ? `<div class="sources-error">${SOURCES_ERROR}</div>` : ''}
      </div>
    </div>`;

  root.querySelectorAll('[data-remove]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      FEEDS = FEEDS.filter(f=>f.id !== btn.dataset.remove);
      saveFeeds();
      SOURCES_ERROR = '';
      renderSourcesPanel();
      loadAll();
    });
  });

  document.getElementById('addFeedBtn').addEventListener('click', async ()=>{
    const name = document.getElementById('newFeedName').value.trim();
    const inputUrl = document.getElementById('newFeedUrl').value.trim();
    const cat = document.getElementById('newFeedCat').value;
    if(!name || !inputUrl){ SOURCES_ERROR = 'Rellena nombre y URL.'; renderSourcesPanel(); return; }
    if(!/^https?:\/\//i.test(inputUrl)){ SOURCES_ERROR = 'La URL debe empezar por http:// o https://'; renderSourcesPanel(); return; }

    const btn = document.getElementById('addFeedBtn');
    btn.disabled = true; btn.textContent = 'Comprobando…';
    SOURCES_ERROR = '';

    try{
      let finalUrl = inputUrl;
      let note = '';

      const worksDirectly = await urlIsValidFeed(inputUrl);
      if(!worksDirectly){

        if(discovered && await urlIsValidFeed(discovered)){

          note = ' (feed detectado automáticamente)';

      }

      if(!/^https?:\/\//i.test(finalUrl)){
        SOURCES_ERROR = 'El feed detectado no usa http/https, no se puede añadir.';
        renderSourcesPanel();
        return;
      }

      FEEDS.push({ id:'u'+Date.now(), cat, name, url: finalUrl });
      saveFeeds();
      SOURCES_ERROR = '';
      renderSourcesPanel();
      loadAll();
    } catch(err){
      SOURCES_ERROR = 'No se pudo comprobar esa URL. Revisa tu conexión o el Worker.';
      renderSourcesPanel();
    }
  });
}

async function urlIsValidFeed(url){
  try{
    const res = await fetchProxy(url);
    if(!res.ok) return false;
    const text = await res.text();
    const doc = new DOMParser().parseFromString(text, 'text/xml');
    if(doc.querySelector('parsererror')) return false;
    const isAtom = doc.querySelector('feed') !== null;
    const count = isAtom ? doc.querySelectorAll('entry').length : doc.querySelectorAll('item').length;
    return count > 0;
  }catch(e){ return false; }
}

async function discoverFeedUrl(pageUrl){
  try{
    const res = await fetchProxy(pageUrl);
    if(!res.ok) return null;
    const html = await res.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const link = doc.querySelector(
      'link[type="application/rss+xml"], link[type="application/atom+xml"], link[type="application/feed+json"]'
    );
    if(!link) return null;
    const href = link.getAttribute('href');
    if(!href) return null;
    return new URL(href, pageUrl).toString();
  }catch(e){ return null; }
}

          ${SWATCHES.map(c=>`<button type="button" class="swatch ${c===CAT_PICKED_COLOR?'selected':''}" data-color="${c}" style="background:${c};"></button>`).join('')}
        </div>
        <button id="addCatBtn">Añadir categoría</button>
        ${CAT_ERROR ? `<div class="sources-error">${escapeHtml(CAT_ERROR)}</div>` : ''}
      </div>
    </div>`;

  root.querySelectorAll('[data-remove-cat]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(btn.disabled) return;
      CUSTOM_CATEGORIES = CUSTOM_CATEGORIES.filter(c=>c.id !== btn.dataset.removeCat);
      saveCustomCategories();
      if(ACTIVE_FILTER === btn.dataset.removeCat) ACTIVE_FILTER = 'all';
      CAT_ERROR = '';
      renderCategoriesPanel();
      renderFilters();
      renderFeed();
    });
  });

  root.querySelectorAll('.swatch').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      CAT_PICKED_COLOR = btn.dataset.color;
      renderCategoriesPanel();
    });
  });

  document.getElementById('addCatBtn').addEventListener('click', ()=>{
    const name = document.getElementById('newCatName').value.trim();
    if(!name){ CAT_ERROR = 'Escribe un nombre para la categoría.'; renderCategoriesPanel(); return; }
    const id = 'c' + name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'') + Date.now().toString(36);
    if(getAllCategories().some(c=>c.label.toLowerCase()===name.toLowerCase())){
      CAT_ERROR = 'Ya existe una categoría con ese nombre.'; renderCategoriesPanel(); return;
    }
    CUSTOM_CATEGORIES.push({ id, label:name, color:CAT_PICKED_COLOR });
    saveCustomCategories();
    CAT_ERROR = '';
    renderCategoriesPanel();
    renderFilters();
  });
}

document.getElementById('categoriesBtn').addEventListener('click', ()=>{
  CATEGORIES_OPEN = !CATEGORIES_OPEN;
  if(CATEGORIES_OPEN){ SOURCES_OPEN = false; renderSourcesPanel(); }
  renderCategoriesPanel();
});
